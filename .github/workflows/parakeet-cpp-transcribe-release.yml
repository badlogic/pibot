name: parakeet-cpp-transcribe macOS release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create/update, e.g. parakeet-cpp-transcribe-v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "parakeet-cpp-transcribe-v*"

permissions:
  contents: write

jobs:
  release:
    name: build and release macOS Apple Silicon binary
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure arm64 macOS build
        run: cmake -S native/parakeet-cpp-stt -B native/parakeet-cpp-stt/build-release -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build native/parakeet-cpp-stt/build-release --target parakeet-cpp-transcribe -j

      - name: Verify binary
        run: |
          file native/parakeet-cpp-stt/build-release/parakeet-cpp-transcribe
          lipo -info native/parakeet-cpp-stt/build-release/parakeet-cpp-transcribe
          otool -L native/parakeet-cpp-stt/build-release/parakeet-cpp-transcribe
          if otool -L native/parakeet-cpp-stt/build-release/parakeet-cpp-transcribe | grep -E '@rpath|libggml|libparakeet'; then
            echo "unexpected non-system dynamic dependency" >&2
            exit 1
          fi
          native/parakeet-cpp-stt/build-release/parakeet-cpp-transcribe --help

      - name: Package release assets
        run: |
          mkdir -p dist release-assets
          cp native/parakeet-cpp-stt/build-release/parakeet-cpp-transcribe dist/parakeet-cpp-transcribe
          tar -C dist -czf release-assets/parakeet-cpp-transcribe-macos-arm64.tar.gz parakeet-cpp-transcribe
          shasum -a 256 release-assets/parakeet-cpp-transcribe-macos-arm64.tar.gz > release-assets/parakeet-cpp-transcribe-macos-arm64.tar.gz.sha256

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
